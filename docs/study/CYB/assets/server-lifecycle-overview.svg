<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1360" viewBox="0 0 2200 1360" role="img" aria-labelledby="title desc">
  <title id="title">Mini DBMS Server lifecycle overview</title>
  <desc id="desc">Simplified infographic showing server command, actors, startup flow, request flow, shutdown flow, and side panels for resources and concepts.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1f2937" />
    </marker>
    <style>
      text {
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        fill: #111827;
      }
      .frame {
        fill: #f8fafc;
        stroke: #d7e1ec;
        stroke-width: 2;
      }
      .title {
        font-size: 30px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 16px;
        fill: #475569;
      }
      .panel {
        fill: #ffffff;
        stroke: #d7e1ec;
        stroke-width: 1.5;
      }
      .panel-title {
        font-size: 18px;
        font-weight: 700;
      }
      .legend {
        font-size: 14px;
        fill: #334155;
      }
      .node {
        stroke-width: 1.7;
        rx: 16;
      }
      .cmd { fill: #f3e8ff; stroke: #a855f7; }
      .actor { fill: #dbeafe; stroke: #3b82f6; }
      .func { fill: #dcfce7; stroke: #22c55e; }
      .warn { fill: #fff7ed; stroke: #f97316; }
      .var { fill: #ffedd5; stroke: #f97316; }
      .concept { fill: #f1f5f9; stroke: #64748b; }
      .node-title {
        font-size: 15px;
        font-weight: 700;
      }
      .node-sub {
        font-size: 12px;
        fill: #475569;
      }
      .flow {
        fill: none;
        stroke: #1f2937;
        stroke-width: 2.8;
        marker-end: url(#arrow);
      }
      .softline {
        fill: none;
        stroke: #94a3b8;
        stroke-width: 2;
        stroke-dasharray: 8 7;
      }
      .small {
        font-size: 13px;
        fill: #334155;
      }
      .footer {
        font-size: 13px;
        fill: #64748b;
      }
    </style>
  </defs>

  <rect width="2200" height="1360" fill="#ffffff" />
  <rect x="24" y="24" width="2152" height="1312" rx="28" class="frame" />

  <text x="64" y="76" class="title">Mini DBMS Server - 서버 실제 동작 흐름</text>
  <text x="64" y="106" class="subtitle">메인 흐름과 보조 정보를 분리한 SVG. 함수 경로를 먼저 읽고, 오른쪽 패널에서 변수와 개념을 보완한다.</text>

  <text x="64" y="146" class="legend">보라색: 실행 명령 / 파란색: 실행 주체 / 초록색: 함수 흐름 / 주황색: 변수·리소스 / 회색: 개념·상태·실행 환경</text>

  <rect x="64" y="184" width="310" height="92" rx="18" class="node cmd" />
  <text x="219" y="220" text-anchor="middle" class="node-title">실행 명령</text>
  <text x="219" y="246" text-anchor="middle" class="node-sub">./db_server 8080</text>

  <rect x="424" y="184" width="180" height="92" rx="18" class="node actor" />
  <text x="514" y="220" text-anchor="middle" class="node-title">main thread</text>
  <text x="514" y="246" text-anchor="middle" class="node-sub">초기화 + accept</text>

  <rect x="654" y="184" width="220" height="92" rx="18" class="node actor" />
  <text x="764" y="220" text-anchor="middle" class="node-title">worker threads[N]</text>
  <text x="764" y="246" text-anchor="middle" class="node-sub">dequeue 이후 요청 처리</text>

  <path d="M 374 230 H 414" class="flow" />
  <path d="M 604 230 H 644" class="flow" />

  <rect x="64" y="326" width="1280" height="280" rx="24" class="panel" />
  <text x="94" y="368" class="panel-title">1. 서버 시작과 listen 준비</text>

  <rect x="104" y="426" width="180" height="72" rx="16" class="node func" />
  <text x="194" y="464" text-anchor="middle" class="node-title">server_main()</text>
  <text x="194" y="486" text-anchor="middle" class="node-sub">포트 파싱</text>

  <rect x="334" y="426" width="180" height="72" rx="16" class="node func" />
  <text x="424" y="464" text-anchor="middle" class="node-title">signal setup</text>
  <text x="424" y="486" text-anchor="middle" class="node-sub">SIGINT / SIGTERM</text>

  <rect x="564" y="426" width="180" height="72" rx="16" class="node func" />
  <text x="654" y="464" text-anchor="middle" class="node-title">server_create()</text>
  <text x="654" y="486" text-anchor="middle" class="node-sub">서버 객체 생성</text>

  <rect x="794" y="426" width="220" height="72" rx="16" class="node func" />
  <text x="904" y="464" text-anchor="middle" class="node-title">table / mutex / pool 초기화</text>
  <text x="904" y="486" text-anchor="middle" class="node-sub">핵심 리소스 준비</text>

  <rect x="1064" y="426" width="230" height="72" rx="16" class="node func" />
  <text x="1179" y="464" text-anchor="middle" class="node-title">socket -&gt; bind -&gt; listen</text>
  <text x="1179" y="486" text-anchor="middle" class="node-sub">listen_fd와 LISTEN 상태 확보</text>

  <path d="M 284 462 H 324" class="flow" />
  <path d="M 514 462 H 554" class="flow" />
  <path d="M 744 462 H 784" class="flow" />
  <path d="M 1014 462 H 1054" class="flow" />

  <text x="104" y="548" class="small">메인 스레드는 이 단계에서 listen 준비를 끝내야 외부의 TCP connect를 받을 수 있다.</text>

  <rect x="64" y="646" width="1280" height="420" rx="24" class="panel" />
  <text x="94" y="688" class="panel-title">2. 요청 처리와 thread pool 동작</text>

  <rect x="104" y="742" width="180" height="72" rx="16" class="node func" />
  <text x="194" y="780" text-anchor="middle" class="node-title">server_run()</text>
  <text x="194" y="802" text-anchor="middle" class="node-sub">메인 루프 진입</text>

  <rect x="334" y="742" width="180" height="72" rx="16" class="node func" />
  <text x="424" y="780" text-anchor="middle" class="node-title">accept loop</text>
  <text x="424" y="802" text-anchor="middle" class="node-sub">새 연결 대기</text>

  <rect x="564" y="742" width="190" height="72" rx="16" class="node func" />
  <text x="659" y="780" text-anchor="middle" class="node-title">accept(listen_fd)</text>
  <text x="659" y="802" text-anchor="middle" class="node-sub">client_fd 획득</text>

  <rect x="804" y="742" width="190" height="72" rx="16" class="node func" />
  <text x="899" y="780" text-anchor="middle" class="node-title">thread_pool_submit()</text>
  <text x="899" y="802" text-anchor="middle" class="node-sub">job queue 적재 시도</text>

  <rect x="1044" y="742" width="180" height="72" rx="16" class="node warn" />
  <text x="1134" y="780" text-anchor="middle" class="node-title">queue full</text>
  <text x="1134" y="802" text-anchor="middle" class="node-sub">503 응답 후 close</text>

  <path d="M 284 778 H 324" class="flow" />
  <path d="M 514 778 H 554" class="flow" />
  <path d="M 754 778 H 794" class="flow" />
  <path d="M 994 778 H 1034" class="flow" />
  <text x="1012" y="754" class="small">실패 분기</text>

  <rect x="104" y="910" width="190" height="72" rx="16" class="node func" />
  <text x="199" y="948" text-anchor="middle" class="node-title">queue enqueue</text>
  <text x="199" y="970" text-anchor="middle" class="node-sub">main thread -&gt; queue</text>

  <rect x="344" y="910" width="190" height="72" rx="16" class="node func" />
  <text x="439" y="948" text-anchor="middle" class="node-title">worker dequeue</text>
  <text x="439" y="970" text-anchor="middle" class="node-sub">worker가 작업 획득</text>

  <rect x="584" y="910" width="210" height="72" rx="16" class="node func" />
  <text x="689" y="948" text-anchor="middle" class="node-title">server_handle_client()</text>
  <text x="689" y="970" text-anchor="middle" class="node-sub">워커 처리 시작</text>

  <rect x="844" y="910" width="180" height="72" rx="16" class="node func" />
  <text x="934" y="948" text-anchor="middle" class="node-title">http_read_request()</text>
  <text x="934" y="970" text-anchor="middle" class="node-sub">HTTP 파싱</text>

  <rect x="1074" y="910" width="180" height="72" rx="16" class="node func" />
  <text x="1164" y="948" text-anchor="middle" class="node-title">api_handle_query()</text>
  <text x="1164" y="970" text-anchor="middle" class="node-sub">SQL + JSON</text>

  <path d="M 899 814 V 874 H 199" class="flow" />
  <text x="917" y="862" class="small">성공 분기</text>

  <path d="M 294 946 H 334" class="flow" />
  <path d="M 534 946 H 574" class="flow" />
  <path d="M 794 946 H 834" class="flow" />
  <path d="M 1024 946 H 1064" class="flow" />

  <rect x="1454" y="742" width="190" height="72" rx="16" class="node func" />
  <text x="1549" y="780" text-anchor="middle" class="node-title">http_send_response()</text>
  <text x="1549" y="802" text-anchor="middle" class="node-sub">응답 전송</text>

  <rect x="1694" y="742" width="180" height="72" rx="16" class="node func" />
  <text x="1784" y="780" text-anchor="middle" class="node-title">close(client_fd)</text>
  <text x="1784" y="802" text-anchor="middle" class="node-sub">요청 1건 종료</text>

  <path d="M 1254 946 H 1354 V 778 H 1444" class="flow" />
  <path d="M 1644 778 H 1684" class="flow" />
  <path d="M 1874 778 H 1934 V 846 H 424" class="flow" />

  <text x="104" y="1026" class="small">thread pool의 핵심은 shared job queue와 worker threads[N]의 producer-consumer 구조다.</text>

  <rect x="64" y="1106" width="1280" height="152" rx="24" class="panel" />
  <text x="94" y="1148" class="panel-title">3. 종료 흐름</text>

  <rect x="124" y="1178" width="220" height="48" rx="14" class="node concept" />
  <text x="234" y="1208" text-anchor="middle" class="node-title">shutdown 요청 감지</text>

  <rect x="404" y="1178" width="220" height="48" rx="14" class="node func" />
  <text x="514" y="1208" text-anchor="middle" class="node-title">thread_pool_shutdown()</text>

  <rect x="684" y="1178" width="180" height="48" rx="14" class="node func" />
  <text x="774" y="1208" text-anchor="middle" class="node-title">server_destroy()</text>

  <rect x="924" y="1178" width="180" height="48" rx="14" class="node func" />
  <text x="1014" y="1208" text-anchor="middle" class="node-title">listen_fd close</text>

  <rect x="1164" y="1178" width="140" height="48" rx="14" class="node func" />
  <text x="1234" y="1208" text-anchor="middle" class="node-title">프로세스 종료</text>

  <path d="M 344 1202 H 394" class="flow" />
  <path d="M 624 1202 H 674" class="flow" />
  <path d="M 864 1202 H 914" class="flow" />
  <path d="M 1104 1202 H 1154" class="flow" />

  <rect x="1404" y="326" width="732" height="356" rx="24" class="panel" />
  <text x="1434" y="368" class="panel-title">변수 / 리소스</text>

  <rect x="1454" y="416" width="150" height="72" rx="16" class="node var" />
  <text x="1529" y="454" text-anchor="middle" class="node-title">listen_fd</text>
  <text x="1529" y="476" text-anchor="middle" class="node-sub">새 연결 대기 소켓</text>

  <rect x="1664" y="416" width="150" height="72" rx="16" class="node var" />
  <text x="1739" y="454" text-anchor="middle" class="node-title">client_fd</text>
  <text x="1739" y="476" text-anchor="middle" class="node-sub">연결 1건 처리</text>

  <rect x="1874" y="416" width="150" height="72" rx="16" class="node var" />
  <text x="1949" y="454" text-anchor="middle" class="node-title">db_mutex</text>
  <text x="1949" y="476" text-anchor="middle" class="node-sub">DB 접근 보호</text>

  <rect x="1454" y="536" width="150" height="72" rx="16" class="node var" />
  <text x="1529" y="574" text-anchor="middle" class="node-title">job queue</text>
  <text x="1529" y="596" text-anchor="middle" class="node-sub">main - workers 공유</text>

  <rect x="1664" y="536" width="150" height="72" rx="16" class="node var" />
  <text x="1739" y="574" text-anchor="middle" class="node-title">worker threads[N]</text>
  <text x="1739" y="596" text-anchor="middle" class="node-sub">고정 개수 워커</text>

  <rect x="1874" y="536" width="150" height="72" rx="16" class="node var" />
  <text x="1949" y="574" text-anchor="middle" class="node-title">table</text>
  <text x="1949" y="596" text-anchor="middle" class="node-sub">in-memory users</text>

  <line x1="1544" y1="488" x2="1544" y2="536" class="softline" />
  <line x1="1739" y1="488" x2="1739" y2="536" class="softline" />
  <line x1="1949" y1="488" x2="1949" y2="536" class="softline" />

  <rect x="1404" y="722" width="732" height="536" rx="24" class="panel" />
  <text x="1434" y="764" class="panel-title">개념 / 상태 / 실행 환경</text>

  <rect x="1454" y="824" width="220" height="74" rx="16" class="node concept" />
  <text x="1564" y="862" text-anchor="middle" class="node-title">LISTEN 상태</text>
  <text x="1564" y="886" text-anchor="middle" class="node-sub">listen() 성공 후 커널에 형성</text>

  <rect x="1714" y="824" width="220" height="74" rx="16" class="node concept" />
  <text x="1824" y="862" text-anchor="middle" class="node-title">새 TCP 연결 대기</text>
  <text x="1824" y="886" text-anchor="middle" class="node-sub">accept loop가 계속 유지</text>

  <rect x="1454" y="938" width="220" height="74" rx="16" class="node concept" />
  <text x="1564" y="976" text-anchor="middle" class="node-title">request per connection</text>
  <text x="1564" y="1000" text-anchor="middle" class="node-sub">요청 1건당 client_fd 1개</text>

  <rect x="1714" y="938" width="220" height="74" rx="16" class="node concept" />
  <text x="1824" y="976" text-anchor="middle" class="node-title">고정 크기 thread pool</text>
  <text x="1824" y="1000" text-anchor="middle" class="node-sub">worker threads[N]</text>

  <rect x="1454" y="1052" width="220" height="74" rx="16" class="node concept" />
  <text x="1564" y="1090" text-anchor="middle" class="node-title">producer-consumer</text>
  <text x="1564" y="1114" text-anchor="middle" class="node-sub">main - queue - workers</text>

  <rect x="1714" y="1052" width="220" height="74" rx="16" class="node concept" />
  <text x="1824" y="1090" text-anchor="middle" class="node-title">queue full -&gt; 503</text>
  <text x="1824" y="1114" text-anchor="middle" class="node-sub">처리 큐 진입 실패</text>

  <rect x="1454" y="1166" width="480" height="70" rx="16" class="node concept" />
  <text x="1694" y="1202" text-anchor="middle" class="node-title">kernel</text>
  <text x="1694" y="1226" text-anchor="middle" class="node-sub">소켓 상태와 connect / accept 성립을 관리하는 실행 환경</text>

  <line x1="1674" y1="861" x2="1714" y2="861" class="softline" />
  <line x1="1674" y1="975" x2="1714" y2="975" class="softline" />
  <line x1="1674" y1="1089" x2="1714" y2="1089" class="softline" />

  <text x="64" y="1302" class="footer">요약: main thread가 listen과 accept를 유지하고, worker threads가 queue를 통해 요청 처리 작업을 가져간다.</text>
</svg>
